<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulateur Postfixe</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f9f9f7;color:#1a1a18;padding:2rem;max-width:680px;margin:auto}
h1{font-size:20px;font-weight:500;margin-bottom:1.5rem}
.expr-display{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin:1rem 0;min-height:48px}
.tok{display:inline-flex;align-items:center;justify-content:center;width:52px;height:48px;border-radius:8px;font-family:monospace;font-size:18px;font-weight:500;border:0.5px solid transparent;transition:all .25s}
.tok-num{background:#E6F1FB;color:#0C447C;border-color:#85B7EB}
.tok-op{background:#FAEEDA;color:#633806;border-color:#EF9F27}
.tok-active{transform:scale(1.15);box-shadow:0 0 0 2px #378ADD}
.tok-done{opacity:.35}
.tok-active-op{transform:scale(1.15);box-shadow:0 0 0 2px #BA7517}
.stack-area{background:#f1efe8;border:0.5px solid #d3d1c7;border-radius:12px;padding:16px;min-height:120px;display:flex;flex-direction:column;justify-content:flex-end;gap:6px;margin:1rem 0;position:relative}
.stack-label{position:absolute;top:10px;left:14px;font-size:11px;color:#888780;font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.stack-item{background:#fff;border:0.5px solid #b4b2a9;border-radius:6px;padding:8px 16px;font-family:monospace;font-size:16px;font-weight:500;color:#1a1a18;text-align:center;width:fit-content;transition:all .3s}
.stack-item.fresh{background:#E1F5EE;border-color:#5DCAA5;color:#085041}
.stack-empty{color:#888780;font-size:13px;text-align:center;padding:1rem}
.explanation{min-height:52px;padding:12px 16px;background:#f1efe8;border-radius:8px;font-size:14px;color:#5f5e5a;line-height:1.6;margin-bottom:1rem;border-left:2px solid #d3d1c7;transition:border-color .3s}
.explanation.explain-num{border-left-color:#378ADD}
.explanation.explain-op{border-left-color:#BA7517}
.explanation.explain-result{border-left-color:#1D9E75;background:#E1F5EE;color:#085041}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}
button{padding:8px 18px;border:0.5px solid #b4b2a9;border-radius:8px;background:transparent;color:#1a1a18;font-size:14px;cursor:pointer;transition:all .15s}
button:hover{background:#f1efe8}
button:disabled{opacity:.4;cursor:default}
button.primary{background:#E6F1FB;color:#0C447C;border-color:#85B7EB}
.exercises{margin-top:1.5rem;display:flex;flex-direction:column;gap:6px}
.ex-btn{text-align:left;padding:10px 14px;font-size:13px;font-family:monospace}
.ex-btn.active-ex{border-color:#85B7EB;color:#0C447C;background:#E6F1FB}
.section-label{font-size:12px;color:#888780;font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin:1rem 0 6px}
.result-banner{padding:14px;background:#E1F5EE;border-radius:8px;border:0.5px solid #5DCAA5;font-size:20px;font-weight:500;color:#085041;font-family:monospace;text-align:center;margin:8px 0}
</style>
</head>
<body>
<h1>Simulateur — Notation Postfixe</h1>
<div class="section-label">Choisis un exercice</div>
<div class="exercises" id="ex-list"></div>
<div class="section-label" style="margin-top:1.5rem">Expression</div>
<div class="expr-display" id="expr-display"></div>
<div class="explanation" id="explanation">Clique sur "Étape suivante" pour démarrer.</div>
<div class="stack-area" id="stack-area">
  <div class="stack-label">Pile</div>
  <div class="stack-empty" id="stack-empty">( pile vide )</div>
</div>
<div class="btn-row">
  <button id="btn-step" onclick="step()" class="primary">Étape suivante</button>
  <button id="btn-reset" onclick="reset()">Recommencer</button>
  <button id="btn-auto" onclick="autoPlay()">Jouer automatiquement</button>
</div>
<script>
const exercises=[
  {label:"Niveau 1 — 3 4 +",tokens:["3","4","+"],expected:7},
  {label:"Niveau 1 — 5 2 -",tokens:["5","2","-"],expected:3},
  {label:"Niveau 1 — 6 3 *",tokens:["6","3","*"],expected:18},
  {label:"Niveau 2 — 3 2 10 * +",tokens:["3","2","10","*","+"],expected:23},
  {label:"Niveau 2 — 5 1 2 + 4 * + 3 -",tokens:["5","1","2","+","4","*","+","3","-"],expected:14},
  {label:"Niveau 3 — 2 3 4 * +",tokens:["2","3","4","*","+"],expected:14},
  {label:"Niveau 3 — 7 2 3 + *",tokens:["7","2","3","+","*"],expected:35},
  {label:"Niveau 3 — 4 2 / 3 1 - *",tokens:["4","2","/","3","1","-","*"],expected:4},
];
const ops={"+":true,"-":true,"*":true,"/":true};
let tokens=[],stack=[],stepIndex=0,done=false,autoTimer=null,currentEx=0;

function loadEx(i){
  currentEx=i;
  document.querySelectorAll('.ex-btn').forEach((b,j)=>b.classList.toggle('active-ex',j===i));
  tokens=exercises[i].tokens.slice();
  reset();
}
function reset(){
  clearTimeout(autoTimer);stack=[];stepIndex=0;done=false;
  document.getElementById('btn-step').disabled=false;
  document.getElementById('btn-auto').disabled=false;
  renderTokens(-1);renderStack([]);
  setExplanation("Clique sur <strong>Étape suivante</strong> pour démarrer.","");
}
function renderTokens(activeIdx){
  const d=document.getElementById('expr-display');
  d.innerHTML=tokens.map((t,i)=>{
    let cls=ops[t]?'tok tok-op':'tok tok-num';
    if(i<activeIdx)cls+=' tok-done';
    if(i===activeIdx)cls+=ops[t]?' tok-active-op':' tok-active';
    return`<div class="${cls}">${t}</div>`;
  }).join('');
}
function renderStack(highlights){
  const area=document.getElementById('stack-area');
  const empty=document.getElementById('stack-empty');
  area.querySelectorAll('.stack-item').forEach(e=>e.remove());
  if(stack.length===0){empty.style.display='block';return;}
  empty.style.display='none';
  stack.forEach((val,i)=>{
    const div=document.createElement('div');
    div.className='stack-item'+(highlights&&highlights.includes(i)?' fresh':'');
    div.textContent=val;area.appendChild(div);
  });
}
function setExplanation(html,type){
  const el=document.getElementById('explanation');
  el.innerHTML=html;
  el.className='explanation'+(type?' explain-'+type:'');
}
function step(){
  if(stepIndex>=tokens.length){finish();return;}
  const token=tokens[stepIndex];
  renderTokens(stepIndex);
  if(!ops[token]){
    stack.push(parseFloat(token));
    renderStack([stack.length-1]);
    setExplanation(`<strong>${token}</strong> est un nombre → on l'empile (push). Pile : [${stack.join(', ')}]`,"num");
  } else {
    if(stack.length<2)return;
    const b=stack.pop(),a=stack.pop();
    let res;
    if(token==='+')res=a+b;else if(token==='-')res=a-b;else if(token==='*')res=a*b;else res=a/b;
    stack.push(res);
    renderStack([stack.length-1]);
    setExplanation(`<strong>${token}</strong> est un opérateur → dépile <strong>${b}</strong> et <strong>${a}</strong>, calcule <strong>${a} ${token} ${b} = ${res}</strong>, empile le résultat.`,"op");
  }
  stepIndex++;
  if(stepIndex>=tokens.length)setTimeout(finish,400);
}
function finish(){
  done=true;document.getElementById('btn-step').disabled=true;
  setExplanation(`Expression évaluée. Résultat final : <strong>${stack[0]}</strong>`,"result");
  const banner=document.createElement('div');
  banner.className='result-banner';banner.textContent='= '+stack[0];
  const area=document.getElementById('stack-area');
  area.querySelector('.result-banner')?.remove();
  area.appendChild(banner);
}
function autoPlay(){
  document.getElementById('btn-auto').disabled=true;
  function doStep(){if(stepIndex<tokens.length){step();autoTimer=setTimeout(doStep,1200);}}
  doStep();
}
const exList=document.getElementById('ex-list');
exercises.forEach((e,i)=>{
  const btn=document.createElement('button');
  btn.className='ex-btn';btn.textContent=e.label;btn.onclick=()=>loadEx(i);
  exList.appendChild(btn);
});
loadEx(0);
</script>
</body>
</html>
